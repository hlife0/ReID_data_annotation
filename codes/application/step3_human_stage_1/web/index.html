<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human Stage 1</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="historyDock" class="history-dock">
        <div class="history-head">
          <h2>我的标注记录</h2>
          <button id="historyToggleBtn" class="btn subtle" type="button">⟨</button>
        </div>
        <div class="history-body">
          <div class="history-toolbar">
            <button id="refreshHistoryBtn" class="btn subtle" type="button">刷新</button>
          </div>
          <p class="history-hint">点击条目进入编辑模式</p>
          <div id="historyList" class="history-list"></div>
          <div class="history-actions">
            <button id="exitEditBtn" class="btn subtle" type="button" hidden>退出编辑</button>
            <button id="saveEditBtn" class="btn" type="button" hidden>保存修改</button>
          </div>
        </div>
      </aside>

      <div class="shell">
        <header class="hero">
          <div>
            <p class="eyebrow">human_stage_1</p>
            <h1>第一轮粗标</h1>
            <p class="hero-copy">每个槽位只允许 `ai_match` / `absent` / `needs_manual`。</p>
          </div>
          <div class="hero-actions">
            <label class="annotator-field">
              <span>Annotator</span>
              <input id="annotatorId" type="text" value="annotator_demo" />
            </label>
            <div id="annotatorProgress" class="annotator-progress">
              <span class="annotator-progress-label">进度</span>
              <div class="annotator-progress-track">
                <div id="annotatorProgressBar" class="annotator-progress-bar"></div>
              </div>
              <span id="annotatorProgressText" class="annotator-progress-text">0 / 2600 帧</span>
            </div>
            <button id="fastSubmitBtn" class="btn subtle danger" type="button" hidden>其余设为不存在并提交</button>
            <button id="submitBtn" class="btn" type="button">提交</button>
          </div>
        </header>

        <section class="status-grid">
          <div><span class="label">视频</span><strong id="videoStem">-</strong></div>
          <div><span class="label">段</span><strong id="segmentId">-</strong></div>
          <div><span class="label">类型</span><strong id="segmentType">-</strong></div>
          <div><span class="label">帧</span><strong id="frameIndex">-</strong></div>
        </section>

        <main class="layout">
          <section class="frame-panel">
            <div class="frame-head">
              <h2>当前帧</h2>
              <p id="frameMeta">-</p>
            </div>
            <div class="frame-stage">
              <img id="frameImage" alt="Stage 1 frame" />
              <div id="aiOverlay" class="ai-overlay"></div>
            </div>
            <div id="aiLegend" class="ai-legend"></div>
          </section>

          <section class="slot-panel">
            <div class="slot-stack">
              <div class="slot-stack-head">
                <h2>槽位决策</h2>
                <div class="slot-stack-actions">
                  <button id="markRemainingAbsentBtn" class="btn subtle danger" type="button">其余设为不存在</button>
                </div>
              </div>
              <div id="slotTabs" class="slot-tabs"></div>
            </div>

            <article class="active-decision-card">
              <div class="active-decision-head">
                <div>
                  <h2 id="activeSlotTitle">P1(赵宇轩)</h2>
                  <p id="activeSlotSummary">未设置</p>
                </div>
                <span class="active-decision-chip">当前槽位</span>
              </div>

              <div class="decision-block">
                <label>匹配 AI 框</label>
                <div id="activeAiButtons" class="ai-buttons"></div>
              </div>

              <div class="decision-block">
                <label>直接标记</label>
                <div class="decision-actions">
                  <button id="activeAbsentBtn" class="decision-btn" type="button">absent</button>
                  <button id="activeNeedsManualBtn" class="decision-btn" type="button">needs_manual</button>
                </div>
              </div>
            </article>
          </section>
        </main>
      </div>
    </div>

    <div id="annotatorModal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="annotatorModalTitle">
        <button
          id="annotatorModalCloseBtn"
          type="button"
          class="modal-close"
          aria-label="关闭"
          title="关闭"
        >
          ×
        </button>
        <h2 id="annotatorModalTitle">先填写标注员ID</h2>
        <p id="annotatorModalDesc">
          未检测到有效的标注员ID。建议现在填写；关闭后将继续使用默认值 annotator_demo。
        </p>
        <label class="modal-field">
          <span id="annotatorModalInputLabel">标注员ID</span>
          <input id="annotatorModalInput" type="text" autocomplete="off" placeholder="请输入你的标注员ID" />
        </label>
        <div id="annotatorModalHint" class="modal-hint"></div>
        <div class="modal-actions">
          <button id="annotatorModalSubmitBtn" type="button" class="btn">提交</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/app.js" defer></script>
  </body>
</html>
