<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多人框标注复核</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="historyDock" class="history-dock">
        <div class="history-head">
          <h2 id="historyTitle" data-i18n="history_title">我的标注记录</h2>
          <button id="historyToggleBtn" class="btn subtle" title="Toggle">⟨</button>
        </div>
        <div class="history-body">
          <div class="history-toolbar">
            <button id="refreshHistoryBtn" class="btn subtle" data-i18n="history_refresh">刷新</button>
          </div>
          <p id="historyHint" class="history-hint" data-i18n="history_hint">
            点击条目进入编辑模式
          </p>
          <div id="historyList" class="history-list"></div>
          <div class="history-actions">
            <button id="exitEditBtn" class="btn subtle" data-i18n="history_exit_edit">退出编辑</button>
            <button id="saveEditBtn" class="btn" data-i18n="history_save_edit">保存修改</button>
          </div>
        </div>
      </aside>

      <div class="page-shell">
        <header class="header">
        <div class="header-title-block">
          <h1 id="pageTitle" data-i18n="page_title">多人框标注复核</h1>
          <p id="pageSubtitle" data-i18n="page_subtitle">P1-P7 多人标注流程。</p>
        </div>
        <div class="header-meta">
          <label>
            <span id="annotatorLabel" data-i18n="annotator_id">标注员ID</span>
            <input id="annotatorId" type="text" value="annotator_demo" />
          </label>
          <div class="progress-block">
            <span id="progressLabel" data-i18n="progress_label">进度</span>
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">0/4000</div>
          </div>
          <button id="nextIssueBtn" class="btn subtle" data-i18n="next_issue">下一问题点</button>
          <button id="nextFrameBtn" class="btn subtle" data-i18n="skip_frame">跳过当前帧</button>
          <button id="submitBtn" class="btn" data-i18n="submit_next">提交并下一帧</button>
          <button id="langToggleBtn" class="btn subtle">EN</button>
        </div>
      </header>

      <section class="status-strip">
        <div><span id="labelVideo" class="label" data-i18n="video">视频</span> <span id="videoStem">-</span></div>
        <div><span id="labelFrame" class="label" data-i18n="frame">帧号</span> <span id="frameIndex">-</span></div>
        <div><span id="labelTs" class="label" data-i18n="timestamp_ms">时间戳(ms)</span> <span id="timestampMs">-</span></div>
        <div><span id="labelCount" class="label" data-i18n="annotation_count">标注次数</span> <span id="annoCount">-</span></div>
      </section>

      <section id="issueSummary" class="issue-summary" hidden>
        <div class="issue-summary-head">
          <span id="issueBadge" class="issue-badge">ISSUE</span>
          <span id="issueIdText" class="issue-id-text">-</span>
        </div>
        <div class="issue-summary-meta">
          <span id="issueRangeText">-</span>
          <span id="issueTrackText">-</span>
          <div class="row-actions">
            <button id="issuePrevFrameBtn" class="btn subtle">上一帧</button>
            <button id="issueNextFrameBtn" class="btn subtle">下一帧</button>
          </div>
        </div>
        <div id="issueReasonList" class="issue-reason-list"></div>
        <div id="issueTimeline" class="issue-timeline"></div>
      </section>

      <main class="main-grid">
        <section class="canvas-panel">
          <div class="canvas-head">
            <div class="legend">
              <span id="chipAi" class="chip chip-ai" data-i18n="chip_ai">AI框（虚线 + track_id）</span>
              <span id="chipUser" class="chip chip-p1" data-i18n="chip_user">用户框（P1-P7）</span>
            </div>
            <div id="canvasHint" class="canvas-hint">准备就绪</div>
          </div>
          <div class="canvas-wrap">
            <canvas id="frameCanvas"></canvas>
          </div>
        </section>

        <section class="control-panel">
          <div id="issueList" class="issue-list-panel">
            <div class="issue-list-head">
              <span data-i18n="issue_list_title">问题列表</span>
              <button id="refreshIssuesBtn" class="btn subtle" data-i18n="history_refresh">刷新</button>
            </div>
            <div id="issueListBody" class="issue-list-body"></div>
          </div>

          <div class="slot-stack">
            <div class="slot-stack-head">
              <span id="slotStackTitle" class="label" data-i18n="slots_title">标注槽位</span>
            </div>
            <div id="slotTabs" class="slot-tabs"></div>
          </div>

          <article class="person-card slot-editor">
            <h2 id="activeSlotTitle">P1</h2>
            <div class="row compact-row">
              <label id="activeSourceLabel" data-i18n="source">来源</label>
              <div id="activeSource" class="source-badge">not_set</div>
            </div>
            <div class="row compact-row">
              <label id="activeAiLabel" data-i18n="apply_ai_box">应用AI框</label>
              <div id="activeAiButtons" class="ai-buttons"></div>
            </div>
            <div class="row compact-row">
              <label id="activeManualLabel" data-i18n="manual_draw">手动画框</label>
              <div class="row-actions">
                <button id="activeDrawBtn" class="btn" data-i18n="draw_new_box">绘制新框</button>
                <button id="activeAbsentBtn" class="btn subtle danger" data-i18n="mark_absent">不存在</button>
                <button id="activeOccludedBtn" class="btn subtle" data-i18n="mark_occluded">遮挡</button>
                <button id="activeOutsideBtn" class="btn subtle" data-i18n="mark_outside">出画</button>
                <button id="setKeyframeAnchorBtn" class="btn subtle">设为关键帧起点</button>
                <button id="submitInterpolationBtn" class="btn subtle">插值到当前帧</button>
                <button id="submitIssueBackwardBtn" class="btn subtle">从当前帧向前应用</button>
                <button id="submitIssueForwardBtn" class="btn subtle">从当前帧向后应用</button>
                <button id="submitIssueRangeBtn" class="btn subtle" data-i18n="submit_issue_range">整段应用</button>
              </div>
            </div>
            <div class="grid4 compact-grid">
              <label>X <input id="activeX" type="number" step="0.1" /></label>
              <label>Y <input id="activeY" type="number" step="0.1" /></label>
              <label>W <input id="activeW" type="number" step="0.1" /></label>
              <label>H <input id="activeH" type="number" step="0.1" /></label>
            </div>
          </article>
        </section>
      </main>
      </div>
    </div>

    <div id="annotatorModal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="annotatorModalTitle">
        <button
          id="annotatorModalCloseBtn"
          type="button"
          class="modal-close"
          aria-label="Close"
          title="Close"
        >
          ×
        </button>
        <h2 id="annotatorModalTitle" data-i18n="annotator_modal_title">先填写标注员ID</h2>
        <p id="annotatorModalDesc" data-i18n="annotator_modal_desc">
          未检测到有效的标注员ID。建议现在填写；关闭后将继续使用默认值 annotator_demo。
        </p>
        <label class="modal-field">
          <span id="annotatorModalInputLabel" data-i18n="annotator_id">标注员ID</span>
          <input id="annotatorModalInput" type="text" autocomplete="off" />
        </label>
        <div id="annotatorModalHint" class="modal-hint"></div>
        <div class="modal-actions">
          <button id="annotatorModalSubmitBtn" type="button" class="btn" data-i18n="annotator_modal_submit">
            提交
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
